<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Evaluator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Interview Evaluation</h1>
            <p>Dynamic Candidate Video Analysis</p>
        </header>

        <div class="upload-section">
            <div class="upload-card">
                <div class="upload-icon">↗️</div>
                <h2>Upload Candidate Video</h2>
                <p>Supports MP4 • Max 10 minutes recommended</p>
                
                <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
                    <input type="file" name="video" accept="video/*" required>
                    <button type="submit" id="submitBtn">Evaluate</button>
                </form>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <h3>Analyzing Video...</h3>
                <p>Please wait while we transcribe and evaluate the interview.</p>
                <small>First time may take longer.</small>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
        });
    </script>
</body>
</html>
